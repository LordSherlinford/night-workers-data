<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>点亮黑夜 - 移动端</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.7.1/cloudbase.full.js"></script>
  <script src="china-map.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0a0a12 0%, #1a1a2e 50%, #0a0a12 100%);
      color: #e0e0e0;
      min-height: 100vh;
      line-height: 1.6;
    }

    .mobile-page {
      width: 100%;
      min-height: 100vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .cover {
      min-height: 55vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 30px 20px;
    }

    .cover-bg {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at 50% 0%, rgba(233, 69, 96, 0.2) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 215, 0, 0.15) 0%, transparent 50%);
    }

    .cover-content {
      position: relative;
      z-index: 1;
      text-align: center;
      width: 100%;
      max-width: 320px;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(233, 69, 96, 0.15));
      border: 2px solid rgba(255, 215, 0, 0.4);
      border-radius: 50%;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
      50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
    }

    .title {
      font-size: 36px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffd700, #e94560);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 24px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 900;
      color: #fff;
      display: block;
    }

    .stat-label {
      font-size: 12px;
      color: #888;
    }

    .content {
      padding: 20px;
      padding-bottom: 40px;
      max-width: 420px;
      margin: 0 auto;
    }

    .card {
      background: linear-gradient(135deg, rgba(22, 33, 62, 0.9), rgba(22, 33, 62, 0.5));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .location-card {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .loc-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 212, 255, 0.12);
      border-radius: 10px;
      flex-shrink: 0;
    }

    .loc-text {
      flex: 1;
      min-width: 0;
      cursor: pointer;
    }

    .loc-title {
      font-size: 12px;
      color: #888;
      margin-bottom: 2px;
    }

    .loc-desc {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .loc-hint {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .loc-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .loc-btn:active {
      transform: scale(0.95);
    }

    .city-picker-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .city-picker-overlay.show {
      display: flex;
    }

    .city-picker {
      width: 100%;
      max-width: 480px;
      background: #1a1a2e;
      border-radius: 20px 20px 0 0;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .picker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .picker-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .picker-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      color: #fff;
    }

    .picker-search {
      padding: 12px 16px;
    }

    .picker-search input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .picker-search input::placeholder {
      color: #666;
    }

    .picker-search input:focus {
      border-color: rgba(0, 212, 255, 0.5);
    }

    .picker-tabs {
      display: flex;
      padding: 0 16px;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .picker-tabs::-webkit-scrollbar {
      display: none;
    }

    .picker-tab {
      padding: 6px 14px;
      background: rgba(255, 255, 255, 0.08);
      border: none;
      border-radius: 16px;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }

    .picker-tab.active {
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
    }

    .picker-cities {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      -webkit-overflow-scrolling: touch;
    }

    .city-item {
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .city-item:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .city-name {
      font-size: 15px;
      color: #fff;
    }

    .city-province {
      font-size: 12px;
      color: #666;
    }

    .city-item.selected {
      background: rgba(255, 215, 0, 0.15);
      border: 1px solid rgba(255, 215, 0, 0.3);
    }

    .city-item.selected .city-name {
      color: #ffd700;
    }

    .no-result {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      font-size: 14px;
    }

    .action-btn {
      width: 100%;
      padding: 16px;
      background: rgba(233, 69, 96, 0.2);
      border: 2px solid rgba(233, 69, 96, 0.3);
      border-radius: 12px;
      color: #888;
      font-size: 16px;
      font-weight: 600;
      cursor: not-allowed;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }

    .action-btn.active {
      background: linear-gradient(135deg, #e94560, #c73e54);
      border-color: #e94560;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
    }

    .action-btn.active:active {
      transform: scale(0.98);
    }

    .action-btn.success {
      background: linear-gradient(135deg, #10b981, #059669);
      border-color: #10b981;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }

    .map-card {
      padding: 12px;
    }

    .map-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #fff;
      text-align: center;
    }

    #map {
      width: 100%;
      height: 280px;
    }

    .map-loading {
      width: 100%;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 14px;
    }

    .footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

<div class="mobile-page">
  <div class="cover">
    <div class="cover-bg"></div>
    <div class="cover-content">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ffd700" stroke-width="1.5">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <h1 class="title">点亮黑夜</h1>
      <p class="subtitle">关注夜间劳动者 · 传递城市温暖</p>
      <div class="stats">
        <div class="stat">
          <span class="stat-value" id="lightCount">0</span>
          <span class="stat-label">次点亮</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="provinceCount">0</span>
          <span class="stat-label">座城市</span>
        </div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="card location-card">
      <div class="loc-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2">
          <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <div class="loc-text" onclick="openCityPicker()">
        <div class="loc-title">当前城市</div>
        <div class="loc-desc" id="locationText">点击选择所在城市</div>
        <div class="loc-hint">点击修改城市</div>
      </div>
      <button class="loc-btn" id="getLocationBtn" onclick="getLocation()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
          <path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
      </button>
    </div>

    <button class="action-btn" id="lightUpBtn" onclick="lightUp()" disabled>
      <span id="actionText">✨ 获取定位后点亮</span>
    </button>

    <div class="card map-card">
      <div class="map-title">中国地图 · 点亮分布</div>
      <div id="map">
        <div class="map-loading">地图加载中...</div>
      </div>
    </div>

    <div class="footer">
      <p>点亮黑夜 · 关注夜间劳动者权益</p>
    </div>
  </div>
</div>

<!-- City Picker -->
<div class="city-picker-overlay" id="cityPickerOverlay" onclick="closeCityPickerOutside(event)">
  <div class="city-picker" onclick="event.stopPropagation()">
    <div class="picker-header">
      <div class="picker-title">选择城市</div>
      <button class="picker-close" onclick="closeCityPicker()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18"/>
          <path d="m6 6 12 12"/>
        </svg>
      </button>
    </div>
    <div class="picker-search">
      <input type="text" id="citySearch" placeholder="搜索城市名称..." oninput="searchCities(this.value)"/>
    </div>
    <div class="picker-tabs" id="provinceTabs"></div>
    <div class="picker-cities" id="cityList"></div>
  </div>
</div>

  async function initCloudBase() {
    if (cloudbaseDb) return true;
    try {
      cloudbaseApp = cloudbase.init({ env: CLOUDBASE_ENV });
      const auth = cloudbaseApp.auth({ persistence: 'local' });
      await auth.signInAnonymously();
      cloudbaseDb = cloudbaseApp.database();
      return true;
    } catch (e) {
      console.warn('CloudBase init failed:', e);
      return false;
    }
  }

  async function fetchLightUpData() {
    try {
      const inited = await initCloudBase();
      if (!inited) return false;
      const res = await cloudbaseDb.collection(COLLECTION).where({ _id: DOC_ID }).get();
      if (res.data && res.data.length > 0) {
        const data = res.data[0];
        litCities = {};
        totalLights = data.total || 0;
        for (const [province, info] of Object.entries(data.provinces || {})) {
          if (info.cities) {
            for (const [city, count] of Object.entries(info.cities)) {
              litCities[city] = count;
            }
          }
        }
        return true;
      }
      return false;
    } catch (e) {
      console.warn('Failed to fetch light up data:', e);
      return false;
    }
  }

  async function sendLightUp(province, city) {
    try {
      const inited = await initCloudBase();
      if (!inited) return false;
      const res = await cloudbaseDb.collection(COLLECTION).where({ _id: DOC_ID }).get();
      let currentData = { total: 0, provinces: {} };
      let hasDoc = false;
      let docId = null;
      if (res.data && res.data.length > 0) {
        currentData = res.data[0];
        hasDoc = true;
        docId = currentData._id;
      }
      if (!currentData.provinces) currentData.provinces = {};
      if (!currentData.provinces[province]) {
        currentData.provinces[province] = { count: 0, cities: {} };
      }
      if (!currentData.provinces[province].cities) {
        currentData.provinces[province].cities = {};
      }
      currentData.total = (currentData.total || 0) + 1;
      currentData.provinces[province].count = currentData.provinces[province].count + 1;
      if (city) {
        currentData.provinces[province].cities[city] = (currentData.provinces[province].cities[city] || 0) + 1;
      }
      if (hasDoc) {
        await cloudbaseDb.collection(COLLECTION).doc(docId).update({
          total: currentData.total,
          provinces: currentData.provinces
        });
      } else {
        await cloudbaseDb.collection(COLLECTION).add({
          _id: DOC_ID,
          total: currentData.total,
          provinces: currentData.provinces
        });
      }
      litCities = {};
      totalLights = currentData.total || 0;
      for (const [p, info] of Object.entries(currentData.provinces || {})) {
        if (info.cities) {
          for (const [c, count] of Object.entries(info.cities)) {
            litCities[c] = count;
          }
        }
      }
      return true;
    } catch (e) {
      console.warn('Failed to send light up:', e);
      return false;
    }
  }

    const overlay = document.getElementById('cityPickerOverlay');
    overlay.classList.add('show');

  }

    const overlay = document.getElementById('cityPickerOverlay');
    overlay.classList.remove('show');

  function closeCityPickerOutside(event) {
    if (event.target.id === 'cityPickerOverlay') {
      closeCityPicker();

    const tabsContainer = document.getElementById('provinceTabs');
    tabsContainer.innerHTML = provinces.map(p => 
      `<button class="picker-tab ${p === selectedProvince ? 'active' : ''}" onclick="selectProvince('${p}')">${p}</button>`
    ).join('');
  }

  function selectProvince(province) {
    selectedProvince = province;
    searchQuery = '';
    document.getElementById('citySearch').value = '';
    renderProvinceTabs();
    renderCityList();
  }

  function searchCities(query) {
    searchQuery = query;
    renderCityList();
  }

  function renderCityList() {
    const listContainer = document.getElementById('cityList');
    let cities = [];

    if (searchQuery) {
      // Search across all provinces
      for (const province in cityData) {
        cityData[province].forEach(city => {
          if (city.includes(searchQuery) || province.includes(searchQuery)) {
            cities.push({ city, province });
          }
        });
      }
    } else {
      // Show cities of selected province
      cities = cityData[selectedProvince].map(c => ({ city: c, province: selectedProvince }));
    }

    if (cities.length === 0) {
      listContainer.innerHTML = '<div class="no-result">未找到匹配的城市</div>';
      return;
    }

    listContainer.innerHTML = cities.map(c => 
      `<div class="city-item ${c.city === currentCity ? 'selected' : ''}" onclick="selectCity('${c.city}', '${c.province}')">
        <div class="city-name">${c.city}</div>
        <div class="city-province">${c.province}</div>
      </div>`
    ).join('');
  }

    currentCity = city;

    document.getElementById('locationText').textContent = `${province} · ${city}`;

  }

  function initMap() {
    const mapDom = document.getElementById('map');

          const count = params.value && params.value[2] ? params.value[2] : 0;

          const color = count > 0 ? '#ffd700' : '#888';
          return `<div style="font-weight:bold;">${params.name}</div>

  function updateMap() {
    if (!mapChart) return;

    const scatterData = Object.keys(litCities).map(name => ({
      name: name,
      value: [...(cityCoords[name] || [0, 0]), litCities[name]]
    })).filter(d => d.value[0] > 0);

    mapChart.setOption({
      series: [{
        data: scatterData
      }]

  }

  function loadMap() {
    function setupMap() {
      initMap();
      updateStats();
      fetchLightUpData().then(function(ok) {
        if (ok) {
          updateMap();
          updateStats();
        }
      });
    }

    if (typeof CHINA_MAP_DATA !== 'undefined') {
      echarts.registerMap('china', CHINA_MAP_DATA);
      setupMap();
    } else {
      fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
        .then(res => res.json())
        .then(geoJson => {
          echarts.registerMap('china', geoJson);

            '<div class="map-loading">地图加载失败，请检查网络连接</div>';

  function lightUp() {
    if (!currentCity) {

    const btn = document.getElementById('lightUpBtn');
    const text = document.getElementById('actionText');
    
    btn.disabled = true;
    text.textContent = '✨ 点亮中...';

    litCities[currentCity] = (litCities[currentCity] || 0) + 1;

    updateStats();
