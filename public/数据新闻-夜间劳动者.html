

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>еҹҺеёӮдёҚе№іпјҢз©ҝжўӯе№іпҝ?пҝ?дёӯеӣҪеҹҺеёӮеӨңй—ҙеҠіеҠЁиҖ…е…ЁжҷҜи°ғпҝ?/title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0a0a12;
  color: #e0e0e0;
  overflow-x: hidden;
  line-height: 1.6;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0a0a12; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #e94560, #c73e54);
  border-radius: 4px;
}
::selection { background: rgba(233, 69, 96, 0.3); color: #fff; }

/* Scroll Progress */
.scroll-progress {
  position: fixed; top: 0; left: 0; right: 0;
  height: 3px; z-index: 9999;
  background: transparent;
}
.scroll-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #e94560, #ffd700, #00d4ff);
  transition: width 0.1s ease-out;
}

/* Side Nav */
.side-nav {
  position: fixed; right: 24px; top: 50%;
  transform: translateY(-50%);
  z-index: 100;
  display: none;
}
@media (min-width: 1024px) { .side-nav { display: block; } }
.side-nav ul { list-style: none; }
.side-nav li { margin: 16px 0; }
.side-nav a {
  display: flex; align-items: center; gap: 12px;
  text-decoration: none; color: #666;
  font-size: 12px; cursor: pointer;
  transition: all 0.3s;
}
.side-nav a:hover { color: #ccc; }
.side-nav a:hover .nav-dot { border-color: rgba(233, 69, 96, 0.5); }
.side-nav a.active { color: #fff; }
.side-nav a.active .nav-dot {
  background: #e94560;
  border-color: #e94560;
  transform: scale(1.25);
  box-shadow: 0 0 12px rgba(233, 69, 96, 0.5);
}
.nav-dot {
  width: 12px; height: 12px;
  border: 2px solid #444;
  border-radius: 50%;
  transition: all 0.3s;
}
.nav-label {
  opacity: 0; transform: translateX(8px);
  transition: all 0.3s;
}
.side-nav a:hover .nav-label { opacity: 1; transform: translateX(0); }
.side-nav a.active .nav-label { opacity: 1; transform: translateX(0); }

/* Background Decor */
.bg-decor {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.bg-blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.12; }
.bg-blob-1 { width: 500px; height: 500px; background: #e94560; top: 10%; left: -10%; animation: pulse1 8s ease-in-out infinite; }
.bg-blob-2 { width: 500px; height: 500px; background: #00d4ff; bottom: 20%; right: -10%; animation: pulse2 10s ease-in-out infinite; }
.bg-blob-3 { width: 700px; height: 700px; background: #ffd700; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.04; }
.bg-blob-4 { width: 300px; height: 300px; background: #9966ff; top: 30%; left: 30%; animation: pulse3 12s ease-in-out infinite; }
@keyframes pulse1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px, -20px); } }
@keyframes pulse2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-40px, 30px); } }
@keyframes pulse3 { 0%,100% { transform: translate(0,0); opacity: 0.08; } 50% { transform: translate(20px, -30px); opacity: 0.12; } }

.bg-grid {
  position: absolute; inset: 0;
  opacity: 0.02;
  background-image:
    linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Content */
.content { position: relative; z-index: 10; }

/* Hero Section */
.hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  text-align: center;
  padding: 0 24px;
  overflow: hidden;
}
.hero-shapes { position: absolute; inset: 0; overflow: hidden; }
.shape {
  position: absolute;
  animation: float 6s ease-in-out infinite;
}
.shape-circle {
  width: 16px; height: 16px;
  border: 2px solid rgba(233, 69, 96, 0.3);
  border-radius: 50%;
}
.shape-square {
  width: 24px; height: 24px;
  border: 2px solid rgba(0, 212, 255, 0.3);
  transform: rotate(45deg);
}
.shape-dot {
  width: 8px; height: 8px;
  background: rgba(255, 215, 0, 0.4);
  border-radius: 50%;
}
.shape-1 { top: 10%; left: 10%; animation-delay: 0s; }
.shape-2 { top: 18%; right: 15%; animation-delay: 1s; }
.shape-3 { bottom: 30%; left: 20%; animation-delay: 2s; }
.shape-4 { top: 45%; right: 10%; animation-delay: 0.5s; }
.shape-5 { bottom: 15%; right: 25%; animation-delay: 3s; }
.shape-6 { top: 25%; left: 5%; animation-delay: 1.5s; }
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(5deg); }
}

.hero-particles { position: absolute; inset: 0; }
.particle {
  position: absolute;
  width: 3px; height: 3px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  animation: float 5s ease-in-out infinite;
}

.hero-line {
  position: absolute; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.2), transparent);
}
.hero-line-1 { top: 30%; }
.hero-line-2 { top: 70%; background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent); }

.hero-content {
  position: relative; z-index: 5;
  max-width: 900px;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  background: linear-gradient(90deg, rgba(233, 69, 96, 0.15), rgba(0, 212, 255, 0.15));
  border: 1px solid rgba(233, 69, 96, 0.3);
  border-radius: 999px;
  margin-bottom: 40px;
  opacity: 0; transform: translateY(20px);
  animation: fadeInUp 0.7s ease-out 0.2s forwards;
}
.hero-badge svg { width: 16px; height: 16px; color: #ffd700; }
.hero-badge span {
  font-size: 14px; color: #e94560;
  font-weight: 500; letter-spacing: 1px;
}

.hero-title {
  font-size: clamp(2.5rem, 7vw, 5rem);
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 32px;
  opacity: 0; transform: translateY(30px);
  animation: fadeInUp 0.8s ease-out 0.4s forwards;
}
.hero-title .gradient {
  background: linear-gradient(135deg, #e94560, #ffd700, #00d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-title .white { color: #fff; }

.hero-desc {
  font-size: clamp(1rem, 2vw, 1.25rem);
  color: #b0b0b0;
  max-width: 800px;
  margin: 0 auto 56px;
  line-height: 1.8;
  opacity: 0; transform: translateY(20px);
  animation: fadeInUp 0.8s ease-out 0.6s forwards;
}

.hero-stats {
  display: flex; flex-wrap: wrap;
  justify-content: center; gap: 32px;
  margin-bottom: 56px;
  opacity: 0; transform: translateY(20px);
  animation: fadeInUp 0.8s ease-out 0.8s forwards;
}
.hero-stat { text-align: center; }
.hero-stat-value {
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 700;
  margin-bottom: 4px;
  transition: transform 0.3s;
}
.hero-stat:hover .hero-stat-value { transform: scale(1.1); }
.hero-stat-value.red { color: #e94560; }
.hero-stat-value.blue { color: #00d4ff; }
.hero-stat-value.gold { color: #ffd700; }
.hero-stat-unit { font-size: 1.2rem; font-weight: 600; }
.hero-stat-label {
  font-size: 13px; color: #777;
  margin-top: 6px;
  position: relative;
}
.hero-stat-label::after {
  content: '';
  position: absolute; bottom: -8px; left: 50%;
  transform: translateX(-50%);
  width: 48px; height: 2px;
  background: linear-gradient(90deg, currentColor, transparent);
  opacity: 0.5;
}
.hero-divider {
  width: 1px; height: 60px;
  background: linear-gradient(180deg, transparent, #555, transparent);
  display: none;
}
@media (min-width: 768px) { .hero-divider { display: block; } }

.hero-btn {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 16px 32px;
  background: linear-gradient(135deg, #e94560, #c73e54);
  color: #fff;
  font-size: 16px; font-weight: 500;
  border: none; border-radius: 999px;
  cursor: pointer;
  transition: all 0.3s;
  opacity: 0; transform: translateY(20px);
  animation: fadeInUp 0.8s ease-out 1s forwards;
}
.hero-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 20px 40px rgba(233, 69, 96, 0.4);
}
.hero-btn svg {
  width: 20px; height: 20px;
  animation: bounce 2s infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(6px); }
}

.hero-scroll-hint {
  position: absolute; bottom: 40px; left: 50%;
  transform: translateX(-50%);
  text-align: center;
  opacity: 0;
  animation: fadeIn 0.8s ease-out 1.2s forwards;
}
.hero-scroll-hint span {
  font-size: 11px; color: #666;
  letter-spacing: 2px; text-transform: uppercase;
  display: block; margin-bottom: 12px;
}
.scroll-mouse {
  width: 24px; height: 40px;
  border: 2px solid #555;
  border-radius: 12px;
  margin: 0 auto;
  position: relative;
}
.scroll-mouse::after {
  content: '';
  position: absolute; top: 8px; left: 50%;
  transform: translateX(-50%);
  width: 6px; height: 10px;
  background: #e94560;
  border-radius: 3px;
  animation: scrollDot 2s ease-in-out infinite;
}
@keyframes scrollDot {
  0%, 100% { transform: translateX(-50%) translateY(0); opacity: 1; }
  50% { transform: translateX(-50%) translateY(12px); opacity: 0.3; }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Section */
.section {
  padding: 120px 24px;
  position: relative;
}
.section-divider {
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.2), transparent);
}
.section-divider.blue {
  background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
}
.section-divider.gold {
  background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
}
.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

/* Section Title */
.section-title {
  text-align: center;
  margin-bottom: 64px;
  opacity: 0; transform: translateY(30px);
  transition: all 0.7s ease-out;
}
.section-title.visible { opacity: 1; transform: translateY(0); }
.st-chapter-wrap {
  display: inline-flex; align-items: center; gap: 12px;
  margin-bottom: 20px;
}
.st-line {
  width: 32px; height: 1px;
  background: linear-gradient(90deg, transparent, #e94560);
}
.st-line.right { background: linear-gradient(90deg, #00d4ff, transparent); }
.st-chapter {
  padding: 6px 16px;
  background: linear-gradient(90deg, rgba(233, 69, 96, 0.15), rgba(0, 212, 255, 0.15));
  border: 1px solid rgba(233, 69, 96, 0.25);
  border-radius: 999px;
  font-size: 14px; color: #e94560;
  font-weight: 500; letter-spacing: 1px;
}
.section-title h2 {
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 700;
  color: #fff;
  margin-bottom: 20px;
  line-height: 1.3;
}
.section-title p {
  font-size: clamp(0.95rem, 1.5vw, 1.125rem);
  color: #888;
  max-width: 700px;
  margin: 0 auto;
  line-height: 1.8;
}
.st-decor {
  display: flex; align-items: center; gap: 8px;
  justify-content: center;
  margin-top: 32px;
}
.st-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  box-shadow: 0 0 16px currentColor;
}
.st-dot.red { background: #e94560; color: #e94560; }
.st-dot.blue { background: #00d4ff; color: #00d4ff; }
.st-bar {
  width: 64px; height: 2px;
  background: linear-gradient(90deg, #e94560, #ffd700, #00d4ff);
  border-radius: 2px;
}

/* Stat Cards */
.stat-cards {
  display: grid;
  grid-template-columns: repeat(1, 1fr);
  gap: 24px;
  margin-bottom: 64px;
}
@media (min-width: 768px) {
  .stat-cards-3 { grid-template-columns: repeat(3, 1fr); }
  .stat-cards-4 { grid-template-columns: repeat(4, 1fr); }
}
.stat-card {
  position: relative;
  padding: 32px;
  background: rgba(22, 33, 62, 0.4);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(233, 69, 96, 0.15);
  border-radius: 16px;
  overflow: hidden;
  opacity: 0; transform: translateY(30px);
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.stat-card.visible { opacity: 1; transform: translateY(0); }
.stat-card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 25px 50px rgba(233, 69, 96, 0.15);
}
.stat-card.blue { border-color: rgba(0, 212, 255, 0.15); }
.stat-card.blue:hover { box-shadow: 0 25px 50px rgba(0, 212, 255, 0.15); }
.stat-card.gold { border-color: rgba(255, 215, 0, 0.15); }
.stat-card.gold:hover { box-shadow: 0 25px 50px rgba(255, 215, 0, 0.15); }
.stat-card.purple { border-color: rgba(153, 102, 255, 0.15); }
.stat-card.purple:hover { box-shadow: 0 25px 50px rgba(153, 102, 255, 0.15); }

.sc-top-bar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0.5;
}
.stat-card .sc-top-bar { background: linear-gradient(90deg, #e94560, #ff6b8a); }
.stat-card.blue .sc-top-bar { background: linear-gradient(90deg, #00d4ff, #66e0ff); }
.stat-card.gold .sc-top-bar { background: linear-gradient(90deg, #ffd700, #ffed4e); }
.stat-card.purple .sc-top-bar { background: linear-gradient(90deg, #9966ff, #c299ff); }

.sc-corner {
  position: absolute;
  width: 24px; height: 24px;
}
.sc-corner.tl { top: 0; left: 0; border-top: 2px solid; border-left: 2px solid; border-radius: 16px 0 0 0; border-color: rgba(233, 69, 96, 0.2); }
.sc-corner.br { bottom: 0; right: 0; border-bottom: 2px solid; border-right: 2px solid; border-radius: 0 0 16px 0; border-color: rgba(233, 69, 96, 0.2); }
.stat-card.blue .sc-corner { border-color: rgba(0, 212, 255, 0.2) !important; }
.stat-card.gold .sc-corner { border-color: rgba(255, 215, 0, 0.2) !important; }
.stat-card.purple .sc-corner { border-color: rgba(153, 102, 255, 0.2) !important; }

.sc-glow {
  position: absolute; top: -20px; right: -20px;
  width: 80px; height: 80px;
  border-radius: 50%;
  filter: blur(30px);
  opacity: 0.1;
  transition: opacity 0.5s;
}
.stat-card:hover .sc-glow { opacity: 0.2; }
.stat-card .sc-glow { background: #e94560; }
.stat-card.blue .sc-glow { background: #00d4ff; }
.stat-card.gold .sc-glow { background: #ffd700; }
.stat-card.purple .sc-glow { background: #9966ff; }

.sc-value {
  font-size: clamp(2rem, 4vw, 2.8rem);
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: -1px;
}
.stat-card .sc-value { color: #e94560; }
.stat-card.blue .sc-value { color: #00d4ff; }
.stat-card.gold .sc-value { color: #ffd700; }
.stat-card.purple .sc-value { color: #9966ff; }
.sc-unit { font-size: 1.2rem; font-weight: 600; opacity: 0.9; margin-left: 4px; }
.sc-label { font-size: 14px; color: #999; font-weight: 500; }
.sc-bar {
  margin-top: 16px;
  height: 2px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
}
.sc-bar-fill {
  height: 100%;
  border-radius: 2px;
  width: 0;
  transition: width 1s ease-out;
}
.stat-card .sc-bar-fill { background: linear-gradient(90deg, #e94560, #ff6b8a); }
.stat-card.blue .sc-bar-fill { background: linear-gradient(90deg, #00d4ff, #66e0ff); }
.stat-card.gold .sc-bar-fill { background: linear-gradient(90deg, #ffd700, #ffed4e); }
.stat-card.purple .sc-bar-fill { background: linear-gradient(90deg, #9966ff, #c299ff); }
.stat-card.visible .sc-bar-fill { width: 75%; }

/* Chart Container */
.chart-grid-2 {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
  margin-bottom: 64px;
}
@media (min-width: 1024px) { .chart-grid-2 { grid-template-columns: 1fr 1fr; } }

.chart-container {
  background: rgba(22, 33, 62, 0.4);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(233, 69, 96, 0.1);
  border-radius: 16px;
  padding: 28px;
  opacity: 0; transform: translateY(30px);
  transition: all 0.7s ease-out;
}
.chart-container.visible { opacity: 1; transform: translateY(0); }
.chart-container.blue { border-color: rgba(0, 212, 255, 0.1); }
.chart-container.gold { border-color: rgba(255, 215, 0, 0.1); }
.chart-container h3 {
  font-size: 17px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 20px;
}
.chart-box { width: 100%; height: 350px; }
.chart-box-tall { width: 100%; height: 420px; }
.chart-box-short { width: 100%; height: 300px; }

.chart-center {
  max-width: 700px;
  margin: 0 auto 64px;
}

/* Text Block */
.text-block {
  max-width: 800px;
  margin: 0 auto 48px;
  text-align: center;
  font-size: clamp(0.95rem, 1.5vw, 1.125rem);
  color: #888;
  line-height: 2;
}
.text-block strong {
  color: #e94560;
  font-weight: 600;
}
.text-block .gold { color: #ffd700; }
.text-block .blue { color: #00d4ff; }

/* Info Card */
.info-card {
  background: rgba(22, 33, 62, 0.4);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 215, 0, 0.15);
  border-radius: 16px;
  padding: 32px;
  position: relative;
  overflow: hidden;
  display: flex; flex-direction: column; justify-content: center;
}
.info-card-glow {
  position: absolute; top: -30px; right: -30px;
  width: 100px; height: 100px;
  background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), transparent);
  border-radius: 50%;
  filter: blur(30px);
}
.info-card h3 {
  display: flex; align-items: center; gap: 12px;
  font-size: 20px; font-weight: 700; color: #fff;
  margin-bottom: 24px;
}
.info-card h3::before {
  content: '';
  width: 4px; height: 28px;
  background: linear-gradient(180deg, #ffd700, #ff8c00);
  border-radius: 2px;
}
.info-big-number {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, #ffd700, #ff8c00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
}
.info-row {
  display: flex; justify-content: space-between;
  padding: 16px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 14px;
}
.info-row:last-of-type { border-bottom: none; }
.info-row .label { color: #888; }
.info-row .value { color: #fff; font-weight: 500; }
.info-text {
  font-size: 14px;
  color: #888;
  line-height: 1.8;
  margin-top: 16px;
}
.salary-compare {
  padding: 16px 0;
  border-top: 1px solid rgba(255,255,255,0.05);
  margin-top: 16px;
}
.salary-compare-label {
  font-size: 13px; color: #888;
  margin-bottom: 12px;
}
.salary-compare-values {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; margin-bottom: 10px;
}
.salary-compare-values .high { color: #00cc99; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.salary-compare-values .low { color: #e94560; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot.green { background: #00cc99; }
.dot.red { background: #e94560; }
.salary-bar {
  height: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  overflow: hidden;
}
.salary-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #00cc99, #ffd700, #e94560);
  border-radius: 4px;
}

/* Conclusion */
.conclusion {
  padding: 140px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.conclusion-glow {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 900px; height: 900px;

<script>
// Generate hero particles
(function() {
  const container = document.getElementById('heroParticles');
  if (!container) return;
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 4 + 's';
    p.style.animationDuration = (4 + Math.random() * 5) + 's';
    p.style.opacity = (0.2 + Math.random() * 0.4).toFixed(2);
    container.appendChild(p);
  }
})();

// Scroll to section
function scrollTo(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth' });
}

// Scroll progress
window.addEventListener('scroll', function() {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  const bar = document.getElementById('scrollProgress');
  if (bar) bar.style.width = progress + '%';

  // Update side nav
  const sections = ['hero', 'section-1', 'section-2', 'section-3', 'conclusion'];
  const mid = scrollTop + window.innerHeight / 2;
  const nav = document.getElementById('sideNav');
  if (!nav) return;
  const links = nav.querySelectorAll('a');
  links.forEach(function(link, i) {
    const sec = document.getElementById(sections[i]);
    if (sec && sec.offsetTop <= mid && (sec.offsetTop + sec.offsetHeight) > mid) {
      link.classList.add('active');
    } else {
      link.classList.remove('active');
    }
  });
});

// Reveal on scroll - with enter/exit animations and chart lazy loading
function initReveal() {
  const els = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      const delay = entry.target.getAttribute('data-delay') || 0;
      if (entry.isIntersecting) {
        setTimeout(function() {
          entry.target.classList.add('visible');
          entry.target.classList.remove('hidden');
        }, parseInt(delay));
        
        const chartId = entry.target.getAttribute('data-chart');
        if (chartId) {
          setTimeout(function() {
            triggerChartAnimation(chartId);
          }, parseInt(delay) + 200);
        }
      } else {
        setTimeout(function() {
          entry.target.classList.remove('visible');
